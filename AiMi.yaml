auto_update:
  url: https://raw.githubusercontent.com/QDwbd/egern/main/AiMi.yaml
  interval: 86400
socks_port: 3090
ipv6: false
allow_external_connections: false
vif_only: false
geoip_db_url: https://github.com/xream/geoip/releases/latest/download/ipinfo.country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
proxy_latency_test_url: http://www.gstatic.com/generate_204
compat_route: true
dns:
  upstreams:
    Global DNS:
    - quic://223.5.5.5:853
    - quic://223.6.6.6:853
    - https://doh.pub/dns-query
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
    - https://dns.cloudflare.com/dns-query
  forward:
  - wildcard:
      match: '*'
      value: Global DNS
policy_groups:
- external:
    name: 订阅
    type: select
    urls:
    - 机场订阅地址
    hidden: false
- select:
    name: Telegram
    policies:
      - HKL
    flatten: true
    icon: https://iili.io/KLr8Sne.png
    hidden: false
- select:
    name: AI
    policies:
      - DE
    flatten: true
    icon: https://iili.io/KLr8Sne.png
    hidden: false
